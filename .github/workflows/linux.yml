name: Linux

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('Linux-{0}', github.event.pull_request.number) || format('Linux-{0}', github.run_id) }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Build Environment (PR)
      if: github.event_name == 'pull_request'
      run: |
        echo "HEAD_REPO_URL=${{ github.event.pull_request.head.repo.clone_url }}" >> $GITHUB_ENV
        echo "COMMIT=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
        echo "BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
        echo "GHA_RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
        echo "BUILD_ORIGIN=ci" >> $GITHUB_ENV
    - name: Set Build Environment (push)
      if: github.event_name != 'pull_request'
      run: |
        echo "HEAD_REPO_URL=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_ENV
        echo "COMMIT=${{ github.sha }}" >> $GITHUB_ENV
        echo "BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
        echo "GHA_RUN_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV
        echo "BUILD_ORIGIN=ci" >> $GITHUB_ENV
    - name: Cache Linux SDK
      uses: actions/cache@v4
      with:
        path: |
          distfiles/sdk/friction-sdk-1.0.0r9-linux-x86_64.tar.xz
          distfiles/linux
        key: friction-linux-sdk-1.0.0r9-appimg-20240401
    - name: Cache Docker image
      id: docker-cache
      uses: actions/cache@v4
      with:
        path: /tmp/friction-vfxplatform-sdk.tar
        key: friction-vfxplatform-sdk-1.0.0r9
    - name: Load Docker image from cache
      if: steps.docker-cache.outputs.cache-hit == 'true'
      run: docker load -i /tmp/friction-vfxplatform-sdk.tar
    - name: Pull and cache Docker image
      if: steps.docker-cache.outputs.cache-hit != 'true'
      run: |
        docker pull frictiongraphics/friction-vfxplatform-sdk
        docker save frictiongraphics/friction-vfxplatform-sdk -o /tmp/friction-vfxplatform-sdk.tar
    - name: Cache ccache binary
      uses: actions/cache@v4
      with:
        path: distfiles/ccache-bin
        key: ccache-static-4.10.2-linux-x86_64
    - name: Cache compiler cache
      uses: actions/cache@v4
      with:
        path: distfiles/ccache
        key: friction-linux-ccache-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          friction-linux-ccache-${{ github.ref_name }}-
          friction-linux-ccache-
    - name: Setup ccache
      run: |
        mkdir -p distfiles/ccache-bin distfiles/ccache
        if [ ! -f distfiles/ccache-bin/ccache ]; then
          curl -L https://github.com/ccache/ccache/releases/download/v4.10.2/ccache-4.10.2-linux-x86_64.tar.xz \
            | tar xJ --strip-components=1 -C distfiles/ccache-bin ccache-4.10.2-linux-x86_64/ccache
        fi
        chmod +x distfiles/ccache-bin/ccache
    - name: Build
      run: ./src/scripts/build.sh
    - name: Artifact
      uses: actions/upload-artifact@v4
      with:
        name: friction-ci-linux-x86_64-${{ github.sha }}
        path: distfiles/builds/*/*.AppImage
